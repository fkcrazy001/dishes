<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家庭菜谱 · 点菜原型</title>
    <style>
      :root {
        --bg: #fff7ee;
        --paper: rgba(255, 255, 255, 0.72);
        --ink: #2d1f17;
        --muted: rgba(45, 31, 23, 0.72);
        --line: rgba(45, 31, 23, 0.12);
        --shadow: 0 18px 60px rgba(45, 31, 23, 0.12);
        --shadow-soft: 0 8px 24px rgba(45, 31, 23, 0.08);
        --radius: 20px;
        --radius-sm: 14px;
        --accent: #e56a54;
        --accent-2: #f2a65a;
        --accent-3: #f6d365;
        --good: #2f8f5b;
        --bad: #c63f3f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 520px at 15% 15%, rgba(242, 166, 90, 0.22), rgba(242, 166, 90, 0) 65%),
          radial-gradient(860px 520px at 85% 20%, rgba(229, 106, 84, 0.18), rgba(229, 106, 84, 0) 70%),
          radial-gradient(1000px 700px at 50% 95%, rgba(246, 211, 101, 0.22), rgba(246, 211, 101, 0) 68%),
          linear-gradient(180deg, #fff2e6, var(--bg));
        min-height: 100vh;
      }

      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 26px 18px 42px;
      }

      .top {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        padding: 18px 18px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        min-width: 240px;
      }

      .badge {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(229, 106, 84, 0.9), rgba(242, 166, 90, 0.9));
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 800;
        letter-spacing: 0.4px;
        box-shadow: 0 10px 18px rgba(229, 106, 84, 0.22);
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
      }

      .brand p {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex: 1;
        justify-content: center;
      }

      .search {
        width: min(520px, 100%);
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.75);
        box-shadow: var(--shadow-soft);
      }

      .search input {
        border: 0;
        outline: none;
        width: 100%;
        font-size: 14px;
        background: transparent;
        color: var(--ink);
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .chip {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--muted);
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
        transition: transform 140ms ease, background 140ms ease, color 140ms ease, border-color 140ms ease;
      }

      .chip:hover {
        transform: translateY(-1px);
        color: var(--ink);
        border-color: rgba(45, 31, 23, 0.22);
      }

      .chip[data-active="true"] {
        color: #fff;
        border-color: transparent;
        background: linear-gradient(135deg, rgba(229, 106, 84, 0.92), rgba(242, 166, 90, 0.92));
        box-shadow: 0 10px 18px rgba(229, 106, 84, 0.16);
      }

      .main {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 16px;
        margin-top: 16px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-head {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 16px;
      }

      .panel-head .meta {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      .menu {
        padding: 16px 16px 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 278px;
      }

      .media {
        position: relative;
        height: 132px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(135deg, rgba(246, 211, 101, 0.4), rgba(229, 106, 84, 0.18));
      }

      .media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.04) contrast(1.03);
      }

      .pin {
        position: absolute;
        left: 10px;
        top: 10px;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(45, 31, 23, 0.14);
        color: rgba(45, 31, 23, 0.88);
        font-size: 12px;
        box-shadow: 0 10px 18px rgba(45, 31, 23, 0.12);
      }

      .pin b {
        font-weight: 800;
        color: var(--accent);
      }

      .content {
        padding: 12px 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1;
      }

      .title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
      }

      .title h3 {
        margin: 0;
        font-size: 15px;
        line-height: 1.2;
      }

      .price {
        font-weight: 800;
        color: rgba(45, 31, 23, 0.88);
        font-size: 14px;
        white-space: nowrap;
      }

      .desc {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .tag {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.74);
        color: rgba(45, 31, 23, 0.74);
      }

      .tag.good {
        border-color: rgba(47, 143, 91, 0.22);
        color: rgba(47, 143, 91, 0.92);
        background: rgba(47, 143, 91, 0.08);
      }

      .tag.warm {
        border-color: rgba(229, 106, 84, 0.22);
        color: rgba(229, 106, 84, 0.92);
        background: rgba(229, 106, 84, 0.08);
      }

      .cta {
        margin-top: auto;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }

      .btn {
        appearance: none;
        border: 0;
        cursor: pointer;
        padding: 10px 12px;
        border-radius: 12px;
        font-weight: 750;
        font-size: 13px;
        transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease;
        user-select: none;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn.primary {
        color: #fff;
        background: linear-gradient(135deg, rgba(229, 106, 84, 0.94), rgba(242, 166, 90, 0.94));
        box-shadow: 0 14px 28px rgba(229, 106, 84, 0.18);
      }

      .btn.ghost {
        color: rgba(45, 31, 23, 0.82);
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--line);
        box-shadow: var(--shadow-soft);
      }

      .btn:hover {
        filter: brightness(1.02);
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .order {
        padding: 0;
      }

      .order-body {
        padding: 14px 16px 16px;
      }

      .order-empty {
        border: 1px dashed rgba(45, 31, 23, 0.22);
        border-radius: var(--radius);
        padding: 14px 14px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.6);
        line-height: 1.6;
        font-size: 13px;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .li {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 12px 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: var(--shadow-soft);
      }

      .li strong {
        font-size: 13px;
      }

      .li .sub {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .qty {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .qty button {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
        cursor: pointer;
        font-weight: 900;
        color: rgba(45, 31, 23, 0.78);
        box-shadow: var(--shadow-soft);
      }

      .qty span {
        min-width: 26px;
        text-align: center;
        font-weight: 850;
        color: rgba(45, 31, 23, 0.86);
      }

      .order-foot {
        padding: 14px 16px 16px;
        border-top: 1px solid var(--line);
        display: grid;
        gap: 10px;
      }

      .sum {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
        color: rgba(45, 31, 23, 0.9);
      }

      .sum .label {
        font-size: 12px;
        color: var(--muted);
      }

      .sum .money {
        font-size: 18px;
        font-weight: 900;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      .actions .btn {
        flex: 1;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(45, 31, 23, 0.14);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
        color: rgba(45, 31, 23, 0.9);
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast[data-show="true"] {
        opacity: 1;
        transform: translateX(-50%) translateY(-2px);
      }

      @media (max-width: 980px) {
        .main {
          grid-template-columns: 1fr;
        }
        .controls {
          display: none;
        }
      }

      @media (max-width: 640px) {
        .wrap {
          padding: 18px 14px 32px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .top {
          padding: 14px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div class="brand">
          <div class="badge">家</div>
          <div>
            <h1>家庭菜谱 · 点菜系统（原型）</h1>
            <p id="subtitle">用图片 + 简要说明，轻松决定今天吃什么</p>
          </div>
        </div>
        <div class="controls">
          <div class="search" role="search">
            <span aria-hidden="true">🔎</span>
            <input id="q" placeholder="搜索：番茄 / 鸡 / 汤 / 甜…" autocomplete="off" />
          </div>
        </div>
        <div class="chips" id="chips" aria-label="分类筛选"></div>
      </header>

      <section class="main">
        <div class="panel">
          <div class="panel-head">
            <h2>今日菜单</h2>
            <div class="meta" id="menuMeta"></div>
          </div>
          <div class="menu">
            <div class="grid" id="grid"></div>
          </div>
        </div>

        <aside class="panel order">
          <div class="panel-head">
            <h2>本次点单</h2>
            <div class="meta" id="orderMeta">0 道菜</div>
          </div>
          <div class="order-body">
            <div class="order-empty" id="empty">
              <div style="font-weight: 850; color: rgba(45, 31, 23, 0.88)">温馨提示</div>
              <div style="margin-top: 6px">从左侧菜单点“加入点单”，这里会自动汇总。</div>
              <div style="margin-top: 6px">适合做家庭投屏点菜：一边看图，一边决定。</div>
            </div>
            <ul class="list" id="list" hidden></ul>
          </div>
          <div class="order-foot">
            <div class="sum">
              <div>
                <div class="label">预计总价</div>
                <div class="hint" id="sumHint">仅用于原型演示，可按成本/预算替换</div>
              </div>
              <div class="money" id="total">¥0</div>
            </div>
            <div class="actions">
              <button class="btn ghost" id="clear">清空</button>
              <button class="btn primary" id="checkout">下单</button>
            </div>
          </div>
        </aside>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      const formatMoney = (n) => `¥${Math.round(n)}`;

      const categories = [
        { id: "all", name: "全部" },
        { id: "home", name: "家常" },
        { id: "soup", name: "汤羹" },
        { id: "sweet", name: "甜点" },
        { id: "quick", name: "快手" },
      ];

      const dishes = [
        {
          id: "tomato-egg",
          name: "番茄炒蛋",
          category: "home",
          time: "10 分钟",
          level: "简单",
          tags: ["下饭", "孩子喜欢", "酸甜"],
          price: 18,
          story: "酸甜番茄遇上嫩滑鸡蛋，永远的家常顶流。",
          palette: ["#f6d365", "#fda085", "#ff9a9e"],
          badge: "经典",
        },
        {
          id: "braised-pork",
          name: "红烧肉",
          category: "home",
          time: "60 分钟",
          level: "中等",
          tags: ["软糯", "浓香", "周末限定"],
          price: 48,
          story: "慢火收汁，油亮不腻，配米饭能吃两碗。",
          palette: ["#f2a65a", "#e56a54", "#f6d365"],
          badge: "招牌",
        },
        {
          id: "chicken-soup",
          name: "玉米胡萝卜鸡汤",
          category: "soup",
          time: "45 分钟",
          level: "简单",
          tags: ["暖胃", "清甜", "加班回血"],
          price: 36,
          story: "清甜不寡淡，喝一口像回到家。",
          palette: ["#f6d365", "#ffecd2", "#fcb69f"],
          badge: "温暖",
        },
        {
          id: "mapo-tofu",
          name: "麻婆豆腐",
          category: "quick",
          time: "15 分钟",
          level: "简单",
          tags: ["香辣", "快手", "豆腐嫩"],
          price: 22,
          story: "麻辣鲜香但不呛，轻松做出馆子味。",
          palette: ["#ff9a9e", "#fecfef", "#f2a65a"],
          badge: "快手",
        },
        {
          id: "fried-rice",
          name: "金黄蛋炒饭",
          category: "quick",
          time: "12 分钟",
          level: "简单",
          tags: ["剩饭救星", "香气足", "一锅端"],
          price: 16,
          story: "粒粒分明，锅气一开，幸福感就来了。",
          palette: ["#f6d365", "#fda085", "#ffd3a5"],
          badge: "一锅",
        },
        {
          id: "milk-pudding",
          name: "桂花牛奶布丁",
          category: "sweet",
          time: "20 分钟",
          level: "简单",
          tags: ["软糯", "治愈", "饭后甜"],
          price: 20,
          story: "淡淡桂花香，像把温柔装进小碗里。",
          palette: ["#ffecd2", "#fcb69f", "#f6d365"],
          badge: "甜甜",
        },
      ];

      const state = {
        activeCategory: "all",
        query: "",
        order: new Map(),
      };

      const el = {
        chips: document.getElementById("chips"),
        q: document.getElementById("q"),
        grid: document.getElementById("grid"),
        menuMeta: document.getElementById("menuMeta"),
        orderMeta: document.getElementById("orderMeta"),
        empty: document.getElementById("empty"),
        list: document.getElementById("list"),
        total: document.getElementById("total"),
        toast: document.getElementById("toast"),
        clear: document.getElementById("clear"),
        checkout: document.getElementById("checkout"),
      };

      const createDishImage = ({ name, palette }) => {
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
            <defs>
              <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="${palette[0]}"/>
                <stop offset="0.55" stop-color="${palette[1]}"/>
                <stop offset="1" stop-color="${palette[2]}"/>
              </linearGradient>
              <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="rgba(45,31,23,0.22)"/>
              </filter>
            </defs>
            <rect width="1200" height="720" fill="url(#g)"/>
            <circle cx="980" cy="140" r="120" fill="rgba(255,255,255,0.20)"/>
            <circle cx="210" cy="560" r="180" fill="rgba(255,255,255,0.16)"/>
            <g filter="url(#s)">
              <rect x="120" y="190" width="960" height="360" rx="44" fill="rgba(255,255,255,0.38)"/>
            </g>
            <text x="160" y="360" font-size="66" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial" fill="rgba(45,31,23,0.92)" font-weight="900">${name}</text>
            <text x="160" y="430" font-size="34" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial" fill="rgba(45,31,23,0.65)" font-weight="700">家庭菜谱 · 点菜原型</text>
          </svg>
        `.trim();
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      };

      const toast = (text) => {
        el.toast.textContent = text;
        el.toast.dataset.show = "true";
        window.clearTimeout(toast._t);
        toast._t = window.setTimeout(() => {
          el.toast.dataset.show = "false";
        }, 1500);
      };

      const getFilteredDishes = () => {
        const q = state.query.trim().toLowerCase();
        return dishes.filter((d) => {
          const byCategory = state.activeCategory === "all" || d.category === state.activeCategory;
          const blob = `${d.name} ${d.tags.join(" ")} ${d.story}`.toLowerCase();
          const byQuery = !q || blob.includes(q);
          return byCategory && byQuery;
        });
      };

      const renderChips = () => {
        el.chips.innerHTML = "";
        categories.forEach((c) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "chip";
          btn.dataset.active = String(state.activeCategory === c.id);
          btn.textContent = c.name;
          btn.addEventListener("click", () => {
            state.activeCategory = c.id;
            renderAll();
          });
          el.chips.appendChild(btn);
        });
      };

      const addToOrder = (dishId) => {
        const curr = state.order.get(dishId) || 0;
        state.order.set(dishId, curr + 1);
        const d = dishes.find((x) => x.id === dishId);
        toast(d ? `已加入：${d.name}` : "已加入");
        renderOrder();
      };

      const updateQty = (dishId, delta) => {
        const curr = state.order.get(dishId) || 0;
        const next = curr + delta;
        if (next <= 0) {
          state.order.delete(dishId);
        } else {
          state.order.set(dishId, next);
        }
        renderOrder();
      };

      const renderMenu = () => {
        const filtered = getFilteredDishes();
        el.grid.innerHTML = "";
        el.menuMeta.textContent = `${filtered.length} 道菜 · 图片展示 + 简短说明`;

        filtered.forEach((d) => {
          const card = document.createElement("article");
          card.className = "card";

          const media = document.createElement("div");
          media.className = "media";
          const img = document.createElement("img");
          img.alt = d.name;
          img.loading = "lazy";
          img.src = createDishImage(d);
          const pin = document.createElement("div");
          pin.className = "pin";
          pin.innerHTML = `<b>★</b><span>${d.badge}</span>`;

          media.appendChild(img);
          media.appendChild(pin);

          const content = document.createElement("div");
          content.className = "content";

          const title = document.createElement("div");
          title.className = "title";
          const h3 = document.createElement("h3");
          h3.textContent = d.name;
          const price = document.createElement("div");
          price.className = "price";
          price.textContent = formatMoney(d.price);
          title.appendChild(h3);
          title.appendChild(price);

          const desc = document.createElement("p");
          desc.className = "desc";
          desc.textContent = d.story;

          const row = document.createElement("div");
          row.className = "row";
          const tag1 = document.createElement("span");
          tag1.className = "tag warm";
          tag1.textContent = `⏱ ${d.time}`;
          const tag2 = document.createElement("span");
          tag2.className = "tag good";
          tag2.textContent = `🍳 ${d.level}`;
          row.appendChild(tag1);
          row.appendChild(tag2);
          d.tags.slice(0, 2).forEach((t) => {
            const s = document.createElement("span");
            s.className = "tag";
            s.textContent = t;
            row.appendChild(s);
          });

          const cta = document.createElement("div");
          cta.className = "cta";
          const hint = document.createElement("div");
          hint.className = "hint";
          hint.textContent = "点菜后右侧自动汇总";
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "btn primary";
          btn.textContent = "加入点单";
          btn.addEventListener("click", () => addToOrder(d.id));
          cta.appendChild(hint);
          cta.appendChild(btn);

          content.appendChild(title);
          content.appendChild(desc);
          content.appendChild(row);
          content.appendChild(cta);

          card.appendChild(media);
          card.appendChild(content);
          el.grid.appendChild(card);
        });
      };

      const renderOrder = () => {
        const entries = Array.from(state.order.entries());
        const totalQty = entries.reduce((s, [, q]) => s + q, 0);
        const totalMoney = entries.reduce((s, [id, q]) => {
          const d = dishes.find((x) => x.id === id);
          return s + (d ? d.price * q : 0);
        }, 0);

        el.orderMeta.textContent = `${entries.length} 道菜`;
        el.total.textContent = formatMoney(totalMoney);

        if (entries.length === 0) {
          el.empty.hidden = false;
          el.list.hidden = true;
          el.list.innerHTML = "";
          return;
        }

        el.empty.hidden = true;
        el.list.hidden = false;
        el.list.innerHTML = "";

        entries
          .map(([id, qty]) => {
            const d = dishes.find((x) => x.id === id);
            if (!d) return null;
            return { d, qty };
          })
          .filter(Boolean)
          .sort((a, b) => b.qty - a.qty)
          .forEach(({ d, qty }) => {
            const li = document.createElement("li");
            li.className = "li";

            const left = document.createElement("div");
            const strong = document.createElement("strong");
            strong.textContent = d.name;
            const sub = document.createElement("div");
            sub.className = "sub";
            sub.textContent = `${formatMoney(d.price)} / 份 · ${d.time} · ${d.level}`;
            left.appendChild(strong);
            left.appendChild(sub);

            const right = document.createElement("div");
            right.className = "qty";
            const minus = document.createElement("button");
            minus.type = "button";
            minus.textContent = "−";
            minus.setAttribute("aria-label", `减少 ${d.name}`);
            minus.addEventListener("click", () => updateQty(d.id, -1));
            const num = document.createElement("span");
            num.textContent = String(qty);
            const plus = document.createElement("button");
            plus.type = "button";
            plus.textContent = "+";
            plus.setAttribute("aria-label", `增加 ${d.name}`);
            plus.addEventListener("click", () => updateQty(d.id, +1));
            right.appendChild(minus);
            right.appendChild(num);
            right.appendChild(plus);

            li.appendChild(left);
            li.appendChild(right);
            el.list.appendChild(li);
          });

        if (totalQty >= 6) {
          toast("今天吃得很丰盛呀！");
        }
      };

      const renderAll = () => {
        renderChips();
        renderMenu();
        renderOrder();
      };

      el.q.addEventListener("input", (e) => {
        state.query = e.target.value || "";
        renderMenu();
      });

      el.clear.addEventListener("click", () => {
        if (state.order.size === 0) return;
        state.order.clear();
        toast("已清空点单");
        renderOrder();
      });

      el.checkout.addEventListener("click", () => {
        if (state.order.size === 0) {
          toast("还没点菜哦～");
          return;
        }
        const names = Array.from(state.order.entries())
          .map(([id, qty]) => {
            const d = dishes.find((x) => x.id === id);
            return d ? `${d.name}×${qty}` : null;
          })
          .filter(Boolean)
          .join("，");
        toast(`下单成功：${names}`);
      });

      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      document.getElementById("subtitle").textContent = `今天是 ${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}，一起做点好吃的吧`;

      renderAll();
    </script>
  </body>
</html>
